<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Auto Archiver Collections</title>
    <style>
        body { font-family: sans-serif; margin: 2em; }
        table { border-collapse: collapse; width: 100%; margin-bottom: 2em; }
        th, td { border: 1px solid #ddd; padding: 8px; }
        th { background: #f4f4f4; }
    </style>
</head>
<body>
<h1>Archival Collections</h1>
<div id="collections"></div>
<script>
async function load() {
  const resp = await fetch('/collections');
  const cols = await resp.json();
  const container = document.getElementById('collections');
  container.innerHTML = '';
  cols.forEach((c, idx) => {
    const div = document.createElement('div');
    div.innerHTML = '<h2>' + c.name + '</h2>';
    const table = document.createElement('table');
    table.innerHTML = '<tr><th>URL</th><th>Status</th></tr>' +
      c.items.map(i => `<tr><td>${i.url}</td><td>${i.status || ''}</td></tr>`).join('');
    div.appendChild(table);
    container.appendChild(div);
  });
}
load();
</script>
</body>
</html>
