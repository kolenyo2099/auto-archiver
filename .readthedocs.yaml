# Read the Docs configuration file
# See https://docs.readthedocs.io/en/stable/config-file/v2.html for details

# Required
version: 2


build:
  os: ubuntu-22.04
  tools:
    python: "3.10"
    nodejs: "22"
  jobs:
    post_install:
      - pip install uv
      # Install the package with docs dependencies using uv
      - VIRTUAL_ENV=$READTHEDOCS_VIRTUALENV_PATH uv pip install -e .[docs]

      # generate the config editor page. Schema then HTML
      - VIRTUAL_ENV=$READTHEDOCS_VIRTUALENV_PATH python scripts/generate_settings_schema.py
      # install node dependencies and build the settings
      - cd scripts/settings && npm install && npm run build && yes | cp -v dist/index.html ../../docs/source/installation/settings.html && cd ../..


sphinx:
  configuration: docs/source/conf.py
